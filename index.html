
<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Şans Çarxı</title>

<style>

body{
background:#000;
margin:0;
text-align:center;
font-family:Arial;
color:white;
}

#wheelContainer{
position:relative;
width:600px;
margin:40px auto;
}

#wheel{
width:100%;
display:block;
transform-origin:center center;
}

#pointer{
position:absolute;
top:-30px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:30px solid transparent;
border-right:30px solid transparent;
border-top:60px solid red;
z-index:10;
}

#result{
font-size:70px;
margin-top:10px;
color:#FFD700;
opacity:0;
transition:0.4s;
}

button{
padding:10px 18px;
font-size:18px;
margin:10px;
cursor:pointer;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<div>
<button onclick="toggleFullscreen()">Full Screen</button>
<button onclick="location.href='admin.html'">Admin</button>
</div>

<div id="wheelContainer">
<div id="pointer"></div>
<img id="wheel" src="wheel_clean.png">
</div>

<div id="result"></div>
<canvas id="confetti"></canvas>

<script>

let prizes = JSON.parse(localStorage.getItem("prizes")||"[0,1,0,1,2,0,1,2,0,3,2,3,0,1,0,1,0,2,0,5]")

let wheel=document.getElementById("wheel")

let spinning=false
let velocity=0
let angle=0
let friction=0.992

wheel.onclick=startSpin

function startSpin(){

if(spinning) return

document.getElementById("result").style.opacity=0

velocity=0.6+Math.random()*0.6
spinning=true

animate()

}

function animate(){

if(!spinning) return

velocity*=friction
angle+=velocity

wheel.style.transform="rotate("+angle+"rad)"

if(velocity<0.002){

spinning=false
finish()

return
}

requestAnimationFrame(animate)

}

function finish(){

let deg=(angle*180/Math.PI)%360
let index=Math.floor((360-deg)/18)

let win=prizes[index]

let result=document.getElementById("result")
result.innerHTML=win+" AZN"
result.style.opacity=1

if(win>0){
confetti()
}

}

function toggleFullscreen(){

if(!document.fullscreenElement){
document.documentElement.requestFullscreen()
}else{
document.exitFullscreen()
}

}

function confetti(){

let canvas=document.getElementById("confetti")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<150;i++){

pieces.push({
x:Math.random()*canvas.width,
y:-20,
s:Math.random()*10+5,
vy:Math.random()*3+2,
vx:(Math.random()-0.5)*2
})

}

function frame(){

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{
p.y+=p.vy
p.x+=p.vx

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)"
ctx.fillRect(p.x,p.y,p.s,p.s)
})

requestAnimationFrame(frame)

}

frame()

}

</script>

</body>
</html>
