<!DOCTYPE html>
<html>
<head>
<title>TikTok Race FINAL</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body{background:#000;color:#fff;text-align:center;font-family:sans-serif}
.track{width:90%;margin:auto;margin-top:20px}
.car{height:40px;background:linear-gradient(90deg,red,orange);margin:10px;border-radius:10px;transition:all 0.3s}
#rules{position:fixed;top:10px;right:10px;background:#111;padding:10px;border:1px solid #444;border-radius:10px;width:250px;text-align:left;font-size:14px}
</style>
</head>
<body>

<h1>🚗 TikTok Race FINAL</h1>

<div id="rules">
<b>🚗 Qaydalar</b><br>
🎁 10 gift → qoşul<br>
👥 5 nəfər → start<br>
⏱ 3 dəq yarış<br>
⚡ gift → sürət<br>
🏁 ilk çatan qalib<br>
💰 qalib = 10%<br>
</div>

<button onclick="sendGift()">🎁 Test Gift</button>

<div id="track" class="track"></div>
<h2 id="winner"></h2>
<div id="board"></div>

<script>
const socket = io();
let cars = {};

function sendGift(){
  let user = "user_" + Math.floor(Math.random()*100);
  socket.emit("gift", user);
}

socket.on("racePlayers",(players)=>{
  const track = document.getElementById("track");
  track.innerHTML="";
  cars = {};
  players.forEach(p=>{
    let div = document.createElement("div");
    div.className="car";
    div.innerText=p;
    div.style.width="50px";
    track.appendChild(div);
    cars[p]=div;
  });
});

socket.on("raceStart",()=>{
  let interval = setInterval(()=>{
    for(let p in cars){
      let w = parseInt(cars[p].style.width);
      cars[p].style.width = (w + Math.random()*40) + "px";
      if(w > 900){
        socket.emit("finish", p);
        clearInterval(interval);
      }
    }
  },300);
});

socket.on("winner",(data)=>{
  document.getElementById("winner").innerText =
    "🏆 "+data.winner+" qazandı ("+data.reward+" coin)";

  let html="<h3>TOP 15</h3>";
  let sorted = Object.entries(data.leaderboard).sort((a,b)=>b[1]-a[1]).slice(0,15);
  sorted.forEach((u,i)=>{
    html += (i+1)+". "+u[0]+" ("+u[1]+")<br>";
  });
  document.getElementById("board").innerHTML = html;
});
</script>

</body>
</html>
