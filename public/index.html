
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tiktok Balon</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="boom" src="boom.mp3"></audio>

<div class="left">
<h3>TOP 10 Bəyənənlər</h3>
<ul id="likes"></ul>

<h3>TOP 10 Hədiyyə atanlar</h3>
<ul id="gifts"></ul>
</div>

<div class="center">
<div id="balloon"></div>
<div id="countdown"></div>
<canvas id="fireworks"></canvas>
</div>

<div class="right">
<h2>📜 Qaydalar</h2>
<ul>
<li>🎯 10,000 bəyəni → dərhal partlayış</li>
<li>🎁 5,000 hədiyyə → dərhal partlayış</li>
<li>⏱ 3 dəqiqə max vaxt</li>
<li>🏆 Ən çox hədiyyə atan qalib</li>
</ul>

<h3>🏆 SON QALİBLƏR</h3>
<ul id="winners"></ul>
</div>

<div id="winnerPopup" class="popup hidden">
  <div class="popupBox">
    <h1>🏆 QALİB</h1>
    <p id="winnerText"></p>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
