<!DOCTYPE html>
<html>
<head>
<title>CANLI ÇARX LIVE</title>
<style>
body{background:#000;color:#fff;font-family:sans-serif;margin:0}

/* TOP BAR */
#top{
  position:fixed;
  top:0; left:0; width:100%;
  height:140px;
  background:#000;
  z-index:10;

  

  position:static;
  top:0;
  left:0;
  width:100%;
  
  background:rgba(0,0,0,0.4);  

  margin-top:0px;

  display:flex;
  justify-content:space-between;
  padding:8px 10px;
  
}

.left{
  display:flex;
  margin-left:260px;
}

.right{
  display:flex;
  gap:10px;
  margin-right:140px;
}

.list{width:170px;}
.list b{display:block;margin-bottom:6px;font-size:14px}

.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:4px 0;
  font-size:13px;
}

.avatar{
  width:26px;
  height:26px;
  border-radius:50%;
  margin-right:6px;
}

.name{
  display:flex;
  align-items:center;
}

/* MAIN */
.container{text-align:center; margin-top:70px;}

canvas{margin-top:0px;}
#notify{font-size:26px;color:#00ffcc;margin-top:10px;}
#queue{font-size:14px;color:#ccc;margin-top:10px;}
#pointerWrap{height:20px;}
#pointerTri{position:absolute; right:-30px; top:50%; transform:translateY(-50%) rotate(90deg); width:0;height:0; border-left:14px solid transparent;border-right:14px solid transparent;border-top:22px solid #ff0000;}
#winner{font-size:22px;color:#ffd700;margin-top:10px;}
.glow{animation: glow 1s infinite alternate;}
@keyframes glow{from{color:#ffd700;}to{color:#ffffff;}}
</style>
</head>
<body>

<div id="top">
  <div class="left">
    <div class="list"><b>🏆 TOP QAZANAN</b><div id="topWin"></div></div>
  </div>

  <div class="right">
    <div class="list"><b>👍 TOP LIKE</b><div id="topLike"></div></div>
    <div class="list"><b>🎁 TOP GIFT</b><div id="topGift"></div></div>
  </div>
</div>


<div id="rules" style="position:absolute; top:60px; left:50%; transform:translateX(-50%);
background:rgba(0,0,0,0.6); padding:8px 14px; border-radius:10px;
font-size:14px; color:#00ffcc;">
🎯 QAYDALAR: 👍 500 like = 1 spin • 🎁 50 gift = 1 spin
</div>

<div class="container">
<h2 style='margin-top:5px;'>🎡 CANLI ÇARX</h2>

<div id="notify">Qoşulma gözlənilir...</div>
<div id="winner"></div>

<div style="position:relative;display:inline-block;"><canvas id="wheelCanvas" width="420" height="420"></canvas><div id="pointerTri"></div></div>
<div id="queue">Növbə (TOP15): boşdur</div>
</div>

<script>


const canvas = document.getElementById("wheelCanvas");
const ctx = canvas.getContext("2d");

let prizes = ["0","0.80","0","0.10","0","0.40","0","0.20","0","2","0","0.10","0","0.20","0","0.40","0","0.10","0","0.20","0","0.10","0","0.80","0","0.40","0","0.10","0","0.20"];

let angle = 0, spinning=false, targetIndex=0;
let currentUser = null;
let queue = [];

const cx=210, cy=210, r=200;

function drawWheel(){
  let slice = 2*Math.PI/prizes.length;
  ctx.clearRect(0,0,420,420);
  for(let i=0;i<prizes.length;i++){
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,i*slice+angle,(i+1)*slice+angle);
    ctx.fillStyle = i===targetIndex && !spinning ? "#444" : (i%2? "#222":"#111");
    ctx.fill();
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(i*slice+slice/2+angle);
    ctx.fillStyle="#fff"; ctx.font="14px sans-serif"; ctx.textAlign="right";
    ctx.fillText(prizes[i], r-10, 4); ctx.restore();
  }
  ctx.beginPath(); ctx.arc(cx,cy,45,0,2*Math.PI); ctx.fillStyle="#000"; ctx.fill();
}

function angleForIndex(idx){
  let slice = 2*Math.PI/prizes.length;
  return (2*Math.PI - (idx*slice + slice/2)) % (2*Math.PI);
}
function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }

async function fetchAll(){
  let q = await (await fetch('/queue')).json();
  queue = q;
  document.getElementById("queue").innerText = "Növbə (TOP15): " + q.slice(0,15).map(u=>"👤 "+u.name).join(", ");

  let top = await (await fetch('/top')).json();
  renderList('topWin', top.win);
  renderList('topLike', top.like);
  renderList('topGift', top.gift);
}

function renderList(id, arr){
  const el = document.getElementById(id); el.innerHTML='';
  arr.slice(0,15).forEach(u=>{
    const d=document.createElement('div'); d.className='item';
    d.innerHTML = `<span class="name"><img class="avatar" src="${u.avatar}">${u.name}</span><b>${u.value}</b>`;
    el.appendChild(d);
  });
}

async function spin(){
  if(spinning || queue.length===0) return;
  spinning=true;
  
let cur = await (await fetch('/current')).json();
if(!cur) return;
currentUser = cur;

  showUserState(currentUser,"Hazırlaş");
  document.getElementById("winner").innerText=""; document.getElementById("winner").classList.remove("glow");

  setTimeout(()=>{
    targetIndex = Math.floor(Math.random()*prizes.length);
    const startAngle = angle % (2*Math.PI);
    const targetAngle = angleForIndex(targetIndex);
    const finalAngle = startAngle + 6*2*Math.PI + ((targetAngle-startAngle+2*Math.PI)%(2*Math.PI));

    const duration=30000, start=performance.now();
    function animate(now){
      const t=Math.min(1,(now-start)/duration);
      angle = startAngle + (finalAngle-startAngle)*easeOutCubic(t);
      drawWheel();
      if(t<1) requestAnimationFrame(animate);
      else{
        spinning=false;
        const win = prizes[targetIndex];
        if(win==="0"){
          document.getElementById("notify").innerText = "😅 @"+currentUser.name+" heç nə qazanmadı";
        }else{
          showUserState(currentUser,"Qazandı");
          let w=document.getElementById("winner"); w.innerText="Qazandı: "+win+" AZN"; w.classList.add("glow");
        }
        fetch('/result', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({user:currentUser, win:win})});
        setTimeout(()=>{ spin(); },15000);
      }
    }
    requestAnimationFrame(animate);
  },10000);
}

drawWheel();
setInterval(fetchAll,2000);
setInterval(spin,2000);

// --- SOUND ---
function playSpin(){ document.getElementById("spinSound").play(); }
function playWin(){ document.getElementById("winSound").play(); }

// --- POPUP ---
function showPopup(user, win){
  const p = document.getElementById("popup");
  document.getElementById("popAvatar").src = user.avatar;
  document.getElementById("popName").innerText = "@"+user.name;
  document.getElementById("popWin").innerText = win+" AZN";
  p.style.display="block";
  setTimeout(()=> p.style.display="none",3000);
}


function showUserState(user, text){
  const p = document.getElementById("popup");
  document.getElementById("popAvatar").src = user.avatar;
  document.getElementById("popName").innerText = "@"+user.name;
  document.getElementById("popWin").innerText = text;
  p.style.display="block";

  let t=10;
  document.getElementById("notify").innerText = text + " • "+t+"s";
  let i=setInterval(()=>{
    t--;
    document.getElementById("notify").innerText = text + " • "+t+"s";
    if(t<=0){ clearInterval(i); p.style.display="none"; }
  },1000);
}

</script>

<!-- SOUND -->
<audio id="spinSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
<audio id="winSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<!-- WINNER POPUP -->
<div id="popup" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:#111;padding:20px;border-radius:12px;text-align:center;z-index:999;">
  <img id="popAvatar" style="width:80px;height:80px;border-radius:50%"><br>
  <div id="popName" style="font-size:20px;margin-top:10px;"></div>
  <div id="popWin" style="font-size:24px;color:#ffd700;"></div>
</div>


<style>
.float-area{position:fixed;right:10px;bottom:80px;pointer-events:none;}
.heart,.gift{
 position:absolute;
 font-size:24px;
 animation:floatUp 2s linear forwards;
}
@keyframes floatUp{
 from{transform:translateY(0);opacity:1;}
 to{transform:translateY(-200px);opacity:0;}
}
</style>

<div class="float-area" id="floatArea"></div>

<script>
function spawnHeart(){
 let el=document.createElement('div');
 el.className='heart';
 el.innerText='❤️';
 el.style.right=Math.random()*20+'px';
 document.getElementById('floatArea').appendChild(el);
 setTimeout(()=>el.remove(),2000);
}

function spawnGift(){
 let el=document.createElement('div');
 el.className='gift';
 el.innerText='🎁';
 el.style.right=Math.random()*20+'px';
 document.getElementById('floatArea').appendChild(el);
 setTimeout(()=>el.remove(),2000);
}

setInterval(spawnHeart,1200);
setInterval(spawnGift,2500);
</script>


<style>
.live-stats{
 position:fixed;
 top:10px;
 left:10px;
 background:rgba(0,0,0,0.6);
 padding:10px 14px;
 border-radius:12px;
 font-size:14px;
}
.live-stats div{margin:4px 0;}
</style>

<div class="live-stats">
  <div>❤️ Likes: <span id="liveLikes">0</span></div>
  <div>🎁 Gifts: <span id="liveGifts">0</span></div>
</div>

<script>
async function updateStats(){
 let t = await (await fetch('/top')).json();

 let totalLike = t.like.reduce((a,b)=>a+b.value,0);
 let totalGift = t.gift.reduce((a,b)=>a+b.value,0);

 document.getElementById("liveLikes").innerText = totalLike;
 document.getElementById("liveGifts").innerText = totalGift;
}

setInterval(updateStats,1000);
</script>


<script>
// REAL CLICK SYSTEM
document.addEventListener('click', ()=>{
  fetch('/manual-like',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      name:'viewer',
      avatar:'https://i.pravatar.cc/50'
    })
  });
});
</script>


<script>
// 👤 USER ID (localStorage)
let userId = localStorage.getItem("userId");
if(!userId){
  userId = "user_" + Math.random().toString(36).substr(2,9);
  localStorage.setItem("userId", userId);
}

// 📱 ONLY MOBILE TOUCH
if('ontouchstart' in window){
  document.addEventListener('touchstart', ()=>{
    fetch('/manual-like',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name:userId,
        avatar:'https://i.pravatar.cc/50?u='+userId
      })
    });
  });
}
</script>

</body>
</html>
