
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TikTok Çarxı</title>
<script src="/socket.io/socket.io.js"></script>
<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

#wheel{
width:500px;
height:500px;
border-radius:50%;
border:10px solid #222;
margin:40px auto;
background:conic-gradient(
red,orange,yellow,green,cyan,blue,purple,red
);
}

#pointer{
width:0;
height:0;
border-left:20px solid transparent;
border-right:20px solid transparent;
border-bottom:40px solid red;
margin:auto;
}

#likes{
position:absolute;
right:20px;
top:80px;
background:#111;
padding:10px;
border-radius:8px;
width:200px;
}

#winners{
position:absolute;
left:20px;
top:80px;
background:#111;
padding:10px;
border-radius:8px;
width:200px;
}

#live{
position:absolute;
left:20px;
top:20px;
background:#400;
padding:6px 12px;
border-radius:6px;
}

</style>
</head>

<body>

<div id="live">🔴 LIVE BAĞLI</div>

<h1>TikTok Çarxı</h1>

<div id="pointer"></div>
<div id="wheel"></div>

<div id="likes">
<h3>Son Bəyənənlər</h3>
<ul id="likesList"></ul>
</div>

<div id="winners">
<h3>Qaliblər</h3>
<ul id="winList"></ul>
</div>

<script src="wheel.js"></script>

</body>
</html>
