<!DOCTYPE html>
<html>
<head>
<title>Last Hero FINAL</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body{background:#050510;color:#0ff;font-family:sans-serif}
.player{margin:10px;padding:10px;border:1px solid #0ff;border-radius:8px}
.dead{opacity:0.3}
.bar{height:10px;background:lime}
button{margin:3px}
</style>
</head>
<body>

<h2>⚡ Last Hero Standing FINAL</h2>

<input id="name" placeholder="username">
<button onclick="join()">Join</button>
<button onclick="gift()">Gift</button>
<button onclick="fakeTikTok()">Fake TikTok Gift</button>

<div id="effects"></div>
<div id="players"></div>

<script>
const socket = io();

function join(){
  socket.emit("join", document.getElementById("name").value);
}

function gift(){
  socket.emit("gift");
}

function fakeTikTok(){
  const name = document.getElementById("name").value;
  socket.emit("simulateTikTok", name);
}

socket.on("effect",(e)=>{
  document.getElementById("effects").innerText = JSON.stringify(e);
});

socket.on("update",(players)=>{
  const box=document.getElementById("players");
  box.innerHTML="";
  Object.entries(players).forEach(([id,p])=>{
    const d=document.createElement("div");
    d.className="player "+(p.dead?"dead":"");
    d.innerHTML = "<b>"+p.username+"</b> HP:"+p.hp+
    `<div class="bar" style="width:${p.hp}%"></div>
     <button onclick="attack('${id}')">Attack</button>`;
    box.appendChild(d);
  });
});

function attack(id){
  socket.emit("attack", id);
}
</script>

</body>
</html>
