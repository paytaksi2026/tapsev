<!DOCTYPE html>
<html>
<head>

<title>TikTok Live Wheel</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="winnersPanel">
<h3>Son Qaliblər</h3>

</div>

<div id="leaderboards">
<h3>TOP 10 Qalib</h3>
<ul id="topWinners"></ul>

<h3>TOP 10 Like</h3>

<div id="wheelWrapper">

<b>TikTok Çarxı</b>
<div>100 jeton = 1 spin</div>
<div>100 like = 1 spin</div>
<div>@xeberx.az</div>
</div>

<div id="bigUser"></div>
</div>

<div id="result"></div>

</html>
