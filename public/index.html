<!DOCTYPE html>
<html>
<head>

</head>
<body>

<div id="wheelWrapper">

<div id="pointer"></div>

<canvas id="wheel" width="700" height="700"></canvas>

<div class="centerCircle">

</div>

<div id="userBig"></div>

</div>

<button id="spinBtn">FIRLAT</button>

<div id="result"></div>

<div id="winnersBox">
<h3>Son Qaliblər</h3>
<ul id="winnerList"></ul>
</div>

<script src="wheel.js"></script>

</body>
</html>
