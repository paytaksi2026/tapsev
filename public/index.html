
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TikTok Balloon</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="left">
<h3>TOP 10 LIKE</h3>
<ul id="likes"></ul>
<h3>TOP 10 GIFT</h3>
<ul id="gifts"></ul>
</div>

<div class="center">
<div id="balloon"></div>
<div id="status">OFFLINE</div>
<div id="countdown"></div>
</div>

<div class="right">
<h3>Qaydalar</h3>
<p>5 dəqiqə yarış → balon partlayır</p>
<p>30 saniyə fasilə → yeni yarış</p>
</div>

<script src="app.js"></script>
</body>
</html>
