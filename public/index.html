
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TikTok Çarxı</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="leftPanel">
<h2>❤️ TOP LIKE</h2>
<div id="topLike">No data</div>

<h2>👥 NÖVBƏ</h2>
<div id="queuePanel">Empty</div>
</div>

<div id="wheelContainer">

<div id="pointer">▼</div>
<canvas id="wheel" width="600" height="600"></canvas>

<div id="centerText">
<h2>🎡 TikTok Çarxı</h2>
<p>❤️ 1000 Beyeni = 1 Firlatma</p>
<p>🎁 100 Hediyye Jetonu = 1 Firlatma</p>
</div>

<div id="spinInfo"></div>
<div id="countdown"></div>
<div id="result"></div>

</div>

<div id="rightPanel">
<h2>🎁 TOP GIFT</h2>
<div id="topGift">No data</div>

<h2>🏆 SON QALİBLƏR</h2>
<div id="winnersPanel">No winners yet</div>
</div>

<audio id="spinSound" src="https://cdn.jsdelivr.net/gh/jshawl/AudioFX/spin.mp3"></audio>
<audio id="winSound" src="https://cdn.jsdelivr.net/gh/jshawl/AudioFX/success.mp3"></audio>
<audio id="tickSound" src="https://cdn.jsdelivr.net/gh/jshawl/AudioFX/click.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>
<script src="wheel.js"></script>

<div id="winPopup">
  <div id="winBox">
    <div class="winTitle">🏆 QAZANDINIZ</div>
    <div id="winAmount">0 AZN</div>
  </div>
</div>

</body>
</html>
