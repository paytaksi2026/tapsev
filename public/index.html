<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Balloon Live</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="left">
    <h2>TOP 10 Likes</h2>
    <ul id="likes"></ul>
    <h2>TOP 10 Gifts</h2>
    <ul id="gifts"></ul>
  </div>

  <div class="center">
    <div id="balloon"></div>
    <div id="status" class="offline">OFFLINE</div>
  </div>

  <div class="right">
    <h2>Qaydalar</h2>
    <p>Like və gift balonu böyüdür. 5 dəqiqədən sonra partlayır.</p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
