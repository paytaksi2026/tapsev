
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Gift Arena ULTRA FIX</title>
<script src="/socket.io/socket.io.js"></script>
<style>
html,body{margin:0;background:transparent;overflow:hidden;font-family:Arial}
#hint{position:fixed;top:10px;left:50%;transform:translateX(-50%);color:#fff;
  background:rgba(0,0,0,0.5);padding:8px 14px;border-radius:20px}
canvas{display:block}
</style>
</head>
<body>
<div id="hint">🎁 10 coin gift və ya ❤️ 1000 like et — oyuna qoşul!</div>
<canvas id="c"></canvas>
<script>
const socket = io();
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let players = {};

socket.on("update", p=>players=p);

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  const keys = Object.keys(players);
  let i = 0;

  keys.forEach(id=>{
    const p = players[id];

    // scale world to screen
    const x = (p.x/1200) * c.width;
    const y = (p.y/700) * c.height;
    const r = Math.max(6, (p.size/40) * Math.min(c.width, c.height));

    // glow
    ctx.beginPath();
    ctx.arc(x,y,r+6,0,Math.PI*2);
    ctx.fillStyle="rgba(0,255,255,0.15)";
    ctx.fill();

    // body
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle="rgba(0,255,255,0.9)";
    ctx.fill();

    // name
    ctx.fillStyle="#fff";
    ctx.font="12px Arial";
    ctx.textAlign="center";
    ctx.fillText(p.name || id, x, y - r - 8);

    // HP bar
    const w = 46;
    const hp = Math.max(0, Math.min(100, p.hp));
    ctx.fillStyle="rgba(255,0,0,0.6)";
    ctx.fillRect(x-w/2, y+r+6, w, 5);
    ctx.fillStyle="lime";
    ctx.fillRect(x-w/2, y+r+6, w*(hp/100), 5);
  });

  requestAnimationFrame(draw);
}
draw();

// quick test join via console: socket.emit('join','TestUser')
</script>
</body>
</html>
