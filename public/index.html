<!DOCTYPE html>
<html>
<head>
<title>Last Hero TikTok LIVE</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body{background:#02020a;color:#0ff;font-family:sans-serif}
.player{margin:10px;padding:10px;border:1px solid #0ff;border-radius:10px}
.dead{opacity:0.3}
.bar{height:10px;background:lime}
</style>
</head>
<body>

<h2>🔥 TikTok LIVE Battle (xeberx.az)</h2>

<input id="name" placeholder="TikTok username">
<button onclick="join()">Join</button>

<div id="players"></div>

<script>
const socket = io();

function join(){
  socket.emit("join", document.getElementById("name").value);
}

socket.on("update",(players)=>{
  const box=document.getElementById("players");
  box.innerHTML="";
  Object.entries(players).forEach(([id,p])=>{
    const d=document.createElement("div");
    d.className="player "+(p.dead?"dead":"");
    d.innerHTML = "<b>"+p.username+"</b> HP:"+p.hp+
    `<div class="bar" style="width:${p.hp}%"></div>
     <button onclick="attack('${id}')">Attack</button>`;
    box.appendChild(d);
  });
});

function attack(id){
  socket.emit("attack", id);
}
</script>

</body>
</html>
