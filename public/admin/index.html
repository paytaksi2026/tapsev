
<!DOCTYPE html>
<html>
<head>
<title>Admin Sectors</title>
</head>
<body>

<h2>Sectors Editor</h2>

<textarea id="sectors" rows="10" cols="40"></textarea><br>
<button onclick="save()">Save</button>

<script>

fetch('/api/sectors').then(r=>r.json()).then(d=>{
 document.getElementById('sectors').value=JSON.stringify(d)
})

function save(){

 let arr=JSON.parse(document.getElementById('sectors').value)

 fetch('/api/sectors',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify(arr)
 })

 alert("Saved")

}

</script>

</body>
</html>
