
<!DOCTYPE html>
<html>
<head>
<title>ADMIN PRO PANEL</title>
<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0;padding:20px}
h2{text-align:center;margin-bottom:20px}

.grid{
 display:grid;
 grid-template-columns:1fr 1fr 1fr;
 gap:20px;
}

.card{
 background:#1e293b;
 padding:15px;
 border-radius:12px;
 box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.card h3{
 margin-bottom:10px;
 color:#38bdf8;
}

.item{
 display:flex;
 justify-content:space-between;
 margin:6px 0;
 font-size:14px;
}

.avatar{
 width:24px;
 height:24px;
 border-radius:50%;
 margin-right:6px;
}

.name{
 display:flex;
 align-items:center;
}

</style>
</head>
<body>

<h2>⚙️ ADMIN PANEL PRO</h2>

<div class="grid">
  <div class="card">
    <h3>🏆 TOP QAZANAN</h3>
    <div id="win"></div>
  </div>

  <div class="card">
    <h3>👍 TOP LIKE</h3>
    <div id="like"></div>
  </div>

  <div class="card">
    <h3>🎁 TOP GIFT</h3>
    <div id="gift"></div>
  </div>
</div>

<script>
async function load(){
 let t = await (await fetch('/top')).json();

 render("win", t.win);
 render("like", t.like);
 render("gift", t.gift);
}

function render(id, arr){
 let el=document.getElementById(id);
 el.innerHTML="";
 arr.slice(0,15).forEach(u=>{
  el.innerHTML += `
  <div class="item">
    <span class="name">
      <img class="avatar" src="${u.avatar}">
      ${u.name}
    </span>
    <b>${u.value}</b>
  </div>`;
 });
}

setInterval(load,2000);
</script>

</body>
</html>
